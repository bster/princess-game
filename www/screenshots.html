<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>App Store Screenshots</title>
<style>
body { background: #222; color: #fff; font-family: -apple-system, sans-serif; padding: 20px; }
canvas { display: none; }
.preview { margin: 20px 0; }
.preview img { height: 400px; border: 1px solid #555; border-radius: 8px; }
.preview a { display: inline-block; margin-top: 8px; color: #4af; text-decoration: none; }
h2 { margin-top: 30px; }
</style>
</head>
<body>
<h1>App Store Screenshots (1242 x 2688)</h1>
<div id="output"></div>

<script type="module">
import { W, H, C } from './js/constants.js';
import { drawPrincess } from './js/sprites/princess.js';
import { drawFrank, drawFrankPlayer } from './js/sprites/frank.js';
import { drawGoblin } from './js/sprites/goblin.js';
import { drawSlime } from './js/sprites/slime.js';
import { drawFlyingEnemy } from './js/sprites/flyingEnemy.js';
import { drawCloud, drawBush, drawTree, drawFlag, drawCage } from './js/sprites/environment.js';
import { drawTiara } from './js/sprites/tiara.js';
import { drawPowerUpOrb } from './js/sprites/powerupIcons.js';
import { drawHeart, drawFireball, drawShieldBubble, drawWings } from './js/sprites/effects.js';
import { drawBoss } from './js/sprites/boss.js';

const SW = 1242, SH = 2688;
const scale = SW / W; // scale factor from game coords to screenshot coords

function createCanvas() {
  const c = document.createElement('canvas');
  c.width = SW; c.height = SH;
  return c;
}

function setupCtx(ctx) {
  ctx.scale(scale, scale);
}

// Polyfill roundRect
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
    const r = typeof radii === 'number' ? [radii,radii,radii,radii] :
              Array.isArray(radii) ? radii.concat([0,0,0,0]).slice(0,4) : [0,0,0,0];
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.arcTo(x + w, y, x + w, y + r[1], r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.arcTo(x + w, y + h, x + w - r[2], y + h, r[2]);
    this.lineTo(x + r[3], y + h);
    this.arcTo(x, y + h, x, y + h - r[3], r[3]);
    this.lineTo(x, y + r[0]);
    this.arcTo(x, y, x + r[0], y, r[0]);
    this.closePath();
  };
}

function drawSky(ctx, colors, sunPos) {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, colors[0]);
  grad.addColorStop(0.3, colors[1]);
  grad.addColorStop(0.6, colors[2]);
  grad.addColorStop(1, colors[3] || colors[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  if (sunPos) {
    const [sx, sy, sr] = sunPos;
    const sg = ctx.createRadialGradient(sx, sy, sr * 0.5, sx, sy, sr * 4);
    sg.addColorStop(0, 'rgba(255,250,220,0.4)');
    sg.addColorStop(0.5, 'rgba(255,240,200,0.1)');
    sg.addColorStop(1, 'rgba(255,230,180,0)');
    ctx.fillStyle = sg;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(255,250,230,0.9)';
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBrickGround(ctx, gy) {
  // Simple brick pattern
  ctx.fillStyle = '#E8C252';
  ctx.fillRect(0, gy, W, 4);
  const brickColors = ['#DAA520', '#D4992A', '#E0AD2C', '#CFA030'];
  for (let row = 0; row < 20; row++) {
    for (let col = 0; col < 15; col++) {
      const bx = col * 32 + (row % 2 === 0 ? 0 : 16);
      const by = gy + 4 + row * 16;
      ctx.fillStyle = brickColors[(row + col) % 4];
      ctx.fillRect(bx, by, 30, 14);
      ctx.fillStyle = '#8B7355';
      ctx.fillRect(bx + 30, by, 2, 14);
      ctx.fillRect(bx, by + 14, 32, 2);
    }
  }
}

function drawPlatform(ctx, x, y, w) {
  ctx.fillStyle = C.platform;
  ctx.fillRect(x, y, w, 16);
  ctx.fillStyle = C.platformTop;
  ctx.fillRect(x, y, w, 4);
}

function addText(ctx, text, x, y, font, color, shadow) {
  ctx.save();
  ctx.font = font;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  if (shadow) {
    ctx.shadowColor = shadow;
    ctx.shadowOffsetX = 3;
    ctx.shadowOffsetY = 3;
  }
  ctx.fillText(text, x, y);
  ctx.restore();
}

// ============ SCREENSHOT 1: Title Screen ============
function renderScreenshot1() {
  const canvas = createCanvas();
  const ctx = canvas.getContext('2d');
  setupCtx(ctx);

  const sky = ['#1a5276', '#2e86c1', '#85c1e9', '#d6eaf8'];
  drawSky(ctx, sky, [310, 100, 25]);

  drawCloud(ctx, 60, 120, 80);
  drawCloud(ctx, 250, 90, 60);
  drawCloud(ctx, 340, 160, 70);

  const gy = H - 150;
  drawBrickGround(ctx, gy);

  // Characters
  drawPrincess(ctx, W * 0.35, gy, 1, 30, false);
  drawCage(ctx, W * 0.55, gy - 80, false);
  drawFrank(ctx, W * 0.55 + 35, gy - 95, 30, false);
  drawGoblin(ctx, W * 0.15, gy - 38, 20, false);
  drawGoblin(ctx, W * 0.85, gy - 38, 45, false);

  // Title
  ctx.save();
  ctx.translate(W / 2, 200);
  ctx.font = 'bold 42px Georgia';
  ctx.fillStyle = C.crown;
  ctx.textAlign = 'center';
  ctx.shadowColor = '#c0392b';
  ctx.shadowOffsetX = 3;
  ctx.shadowOffsetY = 3;
  ctx.fillText('Princess', 0, 0);
  ctx.fillText('& Frank', 0, 48);
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
  ctx.restore();

  addText(ctx, 'Save Frank the Pug!', W / 2, 280, '18px Georgia', '#fff');
  addText(ctx, 'Tap to Start', W / 2, H / 2 + 60, 'bold 22px Georgia', '#fff');

  return canvas;
}

// ============ SCREENSHOT 2: Gameplay ============
function renderScreenshot2() {
  const canvas = createCanvas();
  const ctx = canvas.getContext('2d');
  setupCtx(ctx);

  const sky = ['#87CEEB', '#98D8E8', '#B0E0E6', '#C8E6C9'];
  drawSky(ctx, sky, [320, 80, 30]);

  drawCloud(ctx, 40, 100, 90);
  drawCloud(ctx, 200, 70, 60);
  drawCloud(ctx, 320, 130, 70);

  drawBush(ctx, 50, H - 155, 60);
  drawBush(ctx, 280, H - 155, 45);
  drawTree(ctx, 350, H - 150);

  const gy = H - 150;
  drawBrickGround(ctx, gy);

  // Platforms
  drawPlatform(ctx, 30, gy - 100, 100);
  drawPlatform(ctx, 180, gy - 180, 120);
  drawPlatform(ctx, 280, gy - 90, 80);

  // Tiaras
  drawTiara(ctx, 70, gy - 130, 25);
  drawTiara(ctx, 230, gy - 210, 40);
  drawTiara(ctx, 310, gy - 120, 15);

  // Power-up
  drawPowerUpOrb(ctx, 200, gy - 220, 'fire', 30);
  drawPowerUpOrb(ctx, 100, gy - 50, 'shield', 60);

  // Enemies
  drawGoblin(ctx, 300, gy - 38, 35, false);
  drawSlime(ctx, 150, gy - 22, 20, false);
  drawFlyingEnemy(ctx, 250, gy - 250, 50, false);

  // Princess (mid-jump with shield)
  drawShieldBubble(ctx, W * 0.35, gy - 90, 30, 60, 3, 30);
  drawWings(ctx, W * 0.35, gy - 75, 30);
  drawPrincess(ctx, W * 0.35, gy - 30, 1, 30, true, false, 0.85, 1.15);

  // Fireball
  drawFireball(ctx, W * 0.55, gy - 70, 20, 1);

  // Flag
  drawFlag(ctx, 360, gy - 80);

  // HUD
  for (let i = 0; i < 5; i++) {
    drawHeart(ctx, 24 + i * 22, 54, 8, C.heart);
  }
  ctx.font = 'bold 20px Georgia';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'right';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;
  ctx.fillText('2450', W - 20, 60);
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
  ctx.font = '14px Georgia';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.textAlign = 'center';
  ctx.fillText('Enchanted Meadow', W / 2, 58);
  ctx.textAlign = 'left';

  // Caption
  addText(ctx, 'Jump, stomp & collect power-ups!', W / 2, H - 60, 'bold 18px Georgia', '#fff', 'rgba(0,0,0,0.6)');

  return canvas;
}

// ============ SCREENSHOT 3: Boss Fight ============
function renderScreenshot3() {
  const canvas = createCanvas();
  const ctx = canvas.getContext('2d');
  setupCtx(ctx);

  const sky = ['#0d0d1a', '#1a1a3e', '#2d1b69', '#1a0533'];
  drawSky(ctx, sky);

  // Stars
  for (let i = 0; i < 20; i++) {
    const sx = (i * 67 + 30) % W;
    const sy = 50 + (i * 43) % 200;
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.5 + (i % 3) * 0.2;
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5 + (i % 3), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  const gy = H - 150;
  drawBrickGround(ctx, gy);

  // Dark fortress platforms
  drawPlatform(ctx, 20, gy - 120, 90);
  drawPlatform(ctx, 290, gy - 120, 90);

  // Boss
  drawBoss(ctx, W * 0.6, gy - 100, 40, 2, 5, 8, false, -1);

  // Frank player (playing as frank, rescuing princess)
  drawFrankPlayer(ctx, W * 0.25, gy, -1, 45, true, false, 0.85, 1.15);

  // Some fireballs
  drawFireball(ctx, W * 0.4, gy - 50, 15, 1);
  drawFireball(ctx, W * 0.45, gy - 80, 25, 1);

  // Cage with princess in background
  drawCage(ctx, W * 0.75, gy - 80, false);
  drawPrincess(ctx, W * 0.75 + 35, gy - 70, 1, 50, false);

  // Boss HP bar
  const barW = 200, barH = 12;
  const bx = (W - barW) / 2;
  const by = 80;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(bx - 2, by - 2, barW + 4, barH + 4);
  ctx.fillStyle = '#333';
  ctx.fillRect(bx, by, barW, barH);
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(bx, by, barW * 0.625, barH);
  ctx.font = 'bold 10px Georgia';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText('GOBLIN KING', W / 2, by - 4);

  // HUD
  for (let i = 0; i < 3; i++) {
    drawHeart(ctx, 24 + i * 22, 54, 8, C.heart);
  }
  ctx.font = 'bold 20px Georgia';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'right';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;
  ctx.fillText('8750', W - 20, 60);
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
  ctx.font = '14px Georgia';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.textAlign = 'center';
  ctx.fillText('Dark Fortress', W / 2, 58);
  ctx.textAlign = 'left';

  // Caption
  addText(ctx, 'Defeat the Goblin King!', W / 2, H - 60, 'bold 18px Georgia', '#fff', 'rgba(0,0,0,0.6)');

  return canvas;
}

// Generate and display
const screenshots = [
  { name: 'Title Screen', fn: renderScreenshot1 },
  { name: 'Gameplay', fn: renderScreenshot2 },
  { name: 'Boss Fight', fn: renderScreenshot3 },
];

const output = document.getElementById('output');
for (const ss of screenshots) {
  const canvas = ss.fn();
  const dataUrl = canvas.toDataURL('image/png');

  const div = document.createElement('div');
  div.className = 'preview';

  const h = document.createElement('h2');
  h.textContent = ss.name;
  div.appendChild(h);

  const img = document.createElement('img');
  img.src = dataUrl;
  div.appendChild(img);

  div.appendChild(document.createElement('br'));

  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = ss.name.toLowerCase().replace(/\s+/g, '_') + '_1242x2688.png';
  a.textContent = 'Download ' + ss.name + ' (1242x2688)';
  div.appendChild(a);

  output.appendChild(div);
}
</script>
</body>
</html>
