<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Princess & Frank</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: #000;
  overflow: hidden;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
canvas {
  display: block;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  image-rendering: pixelated;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================================
// PRINCESS & FRANK — Full Playable Game
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ---- Constants ----
const W = 393, H = 852;
canvas.width = W; canvas.height = H;

function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
resize();
window.addEventListener('resize', resize);

// Physics — classic side-scroller mechanics (variable jump, coyote time, acceleration)
const GRAVITY_RISE = 0.38;   // gravity while rising & holding jump (floaty apex)
const GRAVITY_FALL = 0.62;   // gravity while falling (snappy descent)
const GRAVITY_CUT = 0.85;    // gravity when jump released early (short hop)
const JUMP_FORCE = -12.5;
const MAX_SPEED = 4.5;
const GROUND_ACCEL = 0.55;   // ground acceleration
const GROUND_DECEL = 0.45;   // ground friction
const AIR_ACCEL = 0.35;      // reduced air control
const AIR_DECEL = 0.15;      // low air friction (momentum preservation)
const MAX_FALL = 14;
const STOMP_BOUNCE = -10;
const COYOTE_FRAMES = 6;     // can jump briefly after walking off ledge
const BUFFER_FRAMES = 6;     // press jump slightly before landing
const CROUCH_H = 35;
const STAND_H = 60;

// Colors from mockup
const C = {
  skin: '#FFD5B8', hair: '#FF9F1C', dress: '#FF69B4', dressLight: '#FF85C8',
  crown: '#FFD700', gem: '#ff4466', eyes: '#2c1810', mouth: '#e77', shoe: '#ff69b4',
  blush: 'rgba(255,150,150,0.5)',
  gobHead: '#9B59B6', gobBody: '#7B4BA0', gobHorn: '#7B4BA0', gobFeet: '#6B3A90',
  gobEyePupil: '#c0392b',
  pugBody: '#D4A574', pugFace: '#1a1a1a', pugEar: '#2a1a0a', pugLeg: '#C49564',
  pugTongue: '#ff7b8a',
  grass: '#4a7', dirt: '#8B5E3C',
  platform: '#6B8E23', platformTop: '#8FBC3A',
  tiara: '#FFD700', tiaraBorder: '#DAA520',
  castle: '#8875a8', castleDoor: '#6b5280',
  cage: '#888', cageTop: '#999',
  heart: '#ff4466',
  flagPole: '#888', flagColor: '#ff69b4',
};

// Gold brick pattern for ground
let brickPattern = null;
(function() {
  const bw = 64, bh = 32;
  const bc = document.createElement('canvas');
  bc.width = bw; bc.height = bh;
  const bctx = bc.getContext('2d');
  bctx.fillStyle = '#8B7355';
  bctx.fillRect(0, 0, bw, bh);
  const colors = ['#DAA520', '#D4992A', '#E0AD2C', '#CFA030'];
  bctx.fillStyle = colors[0]; bctx.fillRect(1, 1, 30, 14);
  bctx.fillStyle = colors[1]; bctx.fillRect(33, 1, 30, 14);
  bctx.fillStyle = colors[2]; bctx.fillRect(1, 17, 14, 14);
  bctx.fillStyle = colors[3]; bctx.fillRect(17, 17, 30, 14);
  bctx.fillStyle = colors[0]; bctx.fillRect(49, 17, 14, 14);
  bctx.fillStyle = 'rgba(255,235,180,0.35)';
  [1,33].forEach(x => bctx.fillRect(x, 1, 30, 2));
  [1,49].forEach(x => bctx.fillRect(x, 17, 14, 2));
  bctx.fillRect(17, 17, 30, 2);
  bctx.fillStyle = 'rgba(100,70,20,0.3)';
  [1,33].forEach(x => bctx.fillRect(x, 13, 30, 2));
  [1,49].forEach(x => bctx.fillRect(x, 29, 14, 2));
  bctx.fillRect(17, 29, 30, 2);
  brickPattern = ctx.createPattern(bc, 'repeat');
})();

// ---- Game state ----
let state = 'title'; // title, playing, levelComplete, gameOver, victory
let level = 0;
let score = 0;
let lives = 5;
let tiaraCount = 0;
let nextLifeTiaras = 10;
let player, enemies, tiaras, particles, flagObj, cageObj;
let camera = { x: 0 };
let levelData;
let levelCompleteTimer = 0;
let gameOverTimer = 0;
let victoryTimer = 0;
let titlePulse = 0;

// ---- Input ----
const input = { left: false, right: false, down: false, jumpPressed: false, jumpEdge: false, _prevJump: false };
const touches = {};

canvas.addEventListener('touchstart', e => { e.preventDefault(); handleTouches(e.touches); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); handleTouches(e.touches); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); handleTouches(e.touches); }, { passive: false });
canvas.addEventListener('touchcancel', e => { e.preventDefault(); handleTouches(e.touches); }, { passive: false });

// Also handle clicks/mouse for desktop testing
let mouseDown = false, mouseX = 0, mouseY = 0;
canvas.addEventListener('mousedown', e => { mouseDown = true; updateMouse(e); });
canvas.addEventListener('mousemove', e => { if (mouseDown) updateMouse(e); });
canvas.addEventListener('mouseup', () => { mouseDown = false; input.left = false; input.right = false; input.jumpPressed = false; });

function updateMouse(e) {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) / rect.width * W;
  mouseY = (e.clientY - rect.top) / rect.height * H;
  input.left = false; input.right = false; input.jumpPressed = false;
  if (mouseDown) {
    if (mouseX < W * 0.5) {
      // left side - dpad
      const cx = 80, cy = H - 80;
      if (mouseX < cx) input.left = true;
      else input.right = true;
    } else {
      input.jumpPressed = true;
    }
  }
}

function handleTouches(touchList) {
  input.left = false; input.right = false; input.jumpPressed = false;
  const rect = canvas.getBoundingClientRect();
  for (let i = 0; i < touchList.length; i++) {
    const t = touchList[i];
    const tx = (t.clientX - rect.left) / rect.width * W;
    const ty = (t.clientY - rect.top) / rect.height * H;
    if (tx < W * 0.5) {
      // left side dpad
      const cx = 80;
      if (tx < cx) input.left = true;
      else input.right = true;
    } else {
      input.jumpPressed = true;
    }
  }
}

// Keyboard for desktop
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

function updateInput() {
  // Keyboard state (WASD / arrows = move, space = jump, S/down = crouch)
  const kbLeft = !!(keys['ArrowLeft'] || keys['KeyA']);
  const kbRight = !!(keys['ArrowRight'] || keys['KeyD']);
  const kbDown = !!(keys['ArrowDown'] || keys['KeyS']);
  const kbJump = !!keys['Space'];
  const kbActive = kbLeft || kbRight || kbJump || kbDown || !!keys['ArrowUp'] || !!keys['KeyW'];
  if (kbActive || _kbWasActive) {
    input.left = kbLeft;
    input.right = kbRight;
    input.down = kbDown;
    input.jumpPressed = kbJump;
  }
  _kbWasActive = kbActive;
  // Edge detect
  input.jumpEdge = input.jumpPressed && !input._prevJump;
  input._prevJump = input.jumpPressed;
}
let _kbWasActive = false;

// ---- Particle system ----
function createParticle(x, y, vx, vy, color, life, size, type) {
  if (particles.length > 50) return;
  particles.push({ x, y, vx, vy, color, life, maxLife: life, size: size || 4, type: type || 'dot' });
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    if (p.type === 'dot') p.vy += 0.1;
    if (p.type === 'text') p.vy -= 0.02;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    if (p.type === 'star') {
      drawStar(p.x - camera.x, p.y, p.size, p.color);
    } else if (p.type === 'heart') {
      drawHeart(p.x - camera.x, p.y, p.size, p.color);
    } else if (p.type === 'text') {
      ctx.font = 'bold 18px Georgia';
      ctx.fillStyle = p.color;
      ctx.textAlign = 'center';
      ctx.fillText(p.text, p.x - camera.x, p.y);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x - camera.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function spawnStompParticles(x, y) {
  for (let i = 0; i < 6; i++) {
    const a = Math.random() * Math.PI * 2;
    createParticle(x, y, Math.cos(a) * 3, Math.sin(a) * 3 - 2, C.crown, 25, 5, 'star');
  }
}

function spawnCollectParticles(x, y) {
  for (let i = 0; i < 5; i++) {
    const a = Math.random() * Math.PI * 2;
    createParticle(x, y, Math.cos(a) * 2, Math.sin(a) * 2 - 1, C.tiara, 20, 4, 'star');
  }
}

function spawnScoreText(x, y, text) {
  const p = { x, y, vx: 0, vy: -1, color: C.crown, life: 45, maxLife: 45, size: 0, type: 'text', text };
  if (particles.length < 50) particles.push(p);
}

function spawnDeathParticles(x, y) {
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    createParticle(x, y, Math.cos(a) * 4, Math.sin(a) * 4 - 3, '#fff', 30, 5, 'dot');
  }
}

function spawnVictoryHearts(x, y) {
  for (let i = 0; i < 3; i++) {
    createParticle(x + Math.random() * 40 - 20, y, (Math.random() - 0.5) * 2, -1 - Math.random() * 2, C.heart, 50, 6, 'heart');
  }
}

// ---- Drawing helpers ----
function drawStar(x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * 4 * Math.PI / 5) - Math.PI / 2;
    const method = i === 0 ? 'moveTo' : 'lineTo';
    ctx[method](x + Math.cos(a) * r, y + Math.sin(a) * r);
    const b = a + 2 * Math.PI / 5;
    ctx.lineTo(x + Math.cos(b) * r * 0.4, y + Math.sin(b) * r * 0.4);
  }
  ctx.closePath();
  ctx.fill();
}

function drawHeart(x, y, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y + size * 0.3);
  ctx.bezierCurveTo(x, y - size * 0.3, x - size, y - size * 0.3, x - size, y + size * 0.1);
  ctx.bezierCurveTo(x - size, y + size * 0.6, x, y + size, x, y + size);
  ctx.bezierCurveTo(x, y + size, x + size, y + size * 0.6, x + size, y + size * 0.1);
  ctx.bezierCurveTo(x + size, y - size * 0.3, x, y - size * 0.3, x, y + size * 0.3);
  ctx.fill();
}

// ---- SPRITE: Princess ----
function drawPrincess(x, y, facing, frame, jumping, crouching) {
  // y = feet position (bottom of sprite, should align with ground)
  ctx.save();
  ctx.translate(x, y);
  if (facing < 0) { ctx.scale(-1, 1); }
  // Crouch scales from feet (origin) so feet stay planted
  if (crouching) { ctx.scale(1, 0.6); }
  // Offset up so sprite draws above feet: feet are at +56 from sprite origin
  ctx.translate(0, -56);

  const bob = jumping ? 0 : Math.sin(frame * 0.15) * 2;
  const legAnim = jumping ? 0 : Math.sin(frame * 0.3) * 8;

  // Hair sides
  ctx.fillStyle = C.hair;
  ctx.fillRect(-20, -28 + bob, 6, 28);
  ctx.fillRect(14, -28 + bob, 6, 28);

  // Dress
  ctx.fillStyle = C.dress;
  ctx.beginPath();
  ctx.moveTo(-16, 4 + bob);
  ctx.lineTo(16, 4 + bob);
  ctx.lineTo(22, 34 + bob);
  ctx.lineTo(-22, 34 + bob);
  ctx.closePath();
  ctx.fill();
  // Dress ruffle
  ctx.fillStyle = C.dressLight;
  ctx.beginPath();
  ctx.ellipse(0, 34 + bob, 22, 6, 0, 0, Math.PI);
  ctx.fill();

  // Legs
  ctx.fillStyle = C.skin;
  ctx.save();
  ctx.translate(-7, 34 + bob);
  ctx.rotate((jumping ? -0.2 : legAnim * 0.015));
  ctx.fillRect(-5, 0, 10, 16);
  ctx.fillStyle = C.shoe;
  ctx.fillRect(-5, 14, 14, 6);
  ctx.restore();
  ctx.save();
  ctx.fillStyle = C.skin;
  ctx.translate(7, 34 + bob);
  ctx.rotate((jumping ? 0.2 : -legAnim * 0.015));
  ctx.fillRect(-5, 0, 10, 16);
  ctx.fillStyle = C.shoe;
  ctx.fillRect(-5, 14, 14, 6);
  ctx.restore();

  // Arms
  const armSwing = jumping ? 0.7 : Math.sin(frame * 0.3) * 0.4;
  ctx.fillStyle = C.skin;
  ctx.save();
  ctx.translate(-16, 6 + bob);
  ctx.rotate(-0.3 - armSwing);
  ctx.fillRect(-4, 0, 8, 22);
  ctx.restore();
  ctx.save();
  ctx.translate(16, 6 + bob);
  ctx.rotate(0.3 + armSwing);
  ctx.fillRect(-4, 0, 8, 22);
  ctx.restore();

  // Head
  ctx.fillStyle = C.skin;
  ctx.beginPath();
  ctx.arc(0, -18 + bob, 18, 0, Math.PI * 2);
  ctx.fill();

  // Hair top
  ctx.fillStyle = C.hair;
  ctx.beginPath();
  ctx.ellipse(0, -28 + bob, 22, 14, 0, Math.PI, 0);
  ctx.fill();

  // Crown
  const crownY = -42 + bob;
  ctx.fillStyle = C.crown;
  ctx.fillRect(-15, crownY + 8, 30, 10);
  // Points
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 10 - 5, crownY + 8);
    ctx.lineTo(i * 10, crownY);
    ctx.lineTo(i * 10 + 5, crownY + 8);
    ctx.fill();
  }
  // Gem
  ctx.fillStyle = C.gem;
  ctx.beginPath();
  ctx.arc(0, crownY + 11, 3, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = C.eyes;
  ctx.beginPath();
  ctx.ellipse(-7, -20 + bob, 3.5, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(7, -20 + bob, 3.5, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-5.5, -21 + bob, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(8.5, -21 + bob, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Blush
  ctx.fillStyle = C.blush;
  ctx.beginPath();
  ctx.ellipse(-12, -14 + bob, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(12, -14 + bob, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.fillStyle = C.mouth;
  ctx.beginPath();
  ctx.arc(0, -10 + bob, 4, 0, Math.PI);
  ctx.fill();

  ctx.restore();
}

// ---- SPRITE: Goblin ----
function drawGoblin(x, y, frame, squished) {
  ctx.save();
  ctx.translate(x, y);

  if (squished) {
    ctx.scale(1, 0.3);
  }

  const bob = Math.sin(frame * 0.1) * 2;

  // Body
  ctx.fillStyle = C.gobBody;
  ctx.beginPath();
  ctx.roundRect(-20, 0 + bob, 40, 32, [0, 0, 12, 12]);
  ctx.fill();

  // Head
  ctx.fillStyle = C.gobHead;
  ctx.beginPath();
  ctx.roundRect(-22, -30 + bob, 44, 34, [12, 12, 8, 8]);
  ctx.fill();

  // Horns
  ctx.fillStyle = C.gobHorn;
  for (const side of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(side * 14, -28 + bob);
    ctx.lineTo(side * 14 - 5, -40 + bob);
    ctx.lineTo(side * 14 + 5, -28 + bob);
    ctx.fill();
  }

  // Eyes
  for (const side of [-1, 1]) {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(side * 10, -16 + bob, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = C.gobEyePupil;
    ctx.beginPath();
    ctx.arc(side * 10 + 1, -15 + bob, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Mouth
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, -6 + bob, 8, 0.1, Math.PI - 0.1);
  ctx.stroke();

  // Feet
  ctx.fillStyle = C.gobFeet;
  const footSpread = Math.sin(frame * 0.15) * 3;
  ctx.beginPath();
  ctx.roundRect(-14 - footSpread, 30 + bob, 14, 8, [0, 0, 6, 6]);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect(footSpread, 30 + bob, 14, 8, [0, 0, 6, 6]);
  ctx.fill();

  ctx.restore();
}

// ---- SPRITE: Slime (pink monster, low to ground) ----
function drawSlime(x, y, frame, squished) {
  ctx.save();
  ctx.translate(x, y);
  if (squished) ctx.scale(1.3, 0.3);

  const bob = Math.sin(frame * 0.12) * 2;
  const squash = 1 + Math.sin(frame * 0.12) * 0.06;

  // Body blob
  ctx.fillStyle = '#FF69B4';
  ctx.beginPath();
  ctx.ellipse(0, 10 + bob, 20 * squash, 14 / squash, 0, 0, Math.PI * 2);
  ctx.fill();

  // Highlight
  ctx.fillStyle = '#FF85C8';
  ctx.beginPath();
  ctx.ellipse(-5, 4 + bob, 7, 4, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(-7, 6 + bob, 4.5, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(7, 6 + bob, 4.5, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Pupils
  ctx.fillStyle = '#d63384';
  ctx.beginPath();
  ctx.ellipse(-5.5, 7 + bob, 2.5, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(8.5, 7 + bob, 2.5, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.strokeStyle = '#c2185b';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 14 + bob, 4, 0.2, Math.PI - 0.2);
  ctx.stroke();

  ctx.restore();
}

// ---- SPRITE: Tiara (collectible) ----
function drawTiara(x, y, frame) {
  ctx.save();
  ctx.translate(x, y);
  const bob = Math.sin(frame * 0.08) * 4;
  const scale = 0.9 + Math.sin(frame * 0.12) * 0.1;
  ctx.translate(0, bob);
  ctx.scale(scale, scale);

  // Glow
  ctx.fillStyle = 'rgba(255,215,0,0.2)';
  ctx.beginPath();
  ctx.arc(0, 0, 16, 0, Math.PI * 2);
  ctx.fill();

  // Base
  ctx.fillStyle = C.tiara;
  ctx.fillRect(-12, 2, 24, 6);
  // Points
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 8 - 4, 2);
    ctx.lineTo(i * 8, -8);
    ctx.lineTo(i * 8 + 4, 2);
    ctx.fill();
  }
  // Gem
  ctx.fillStyle = C.gem;
  ctx.beginPath();
  ctx.arc(0, 4, 2.5, 0, Math.PI * 2);
  ctx.fill();
  // Side gems
  ctx.fillStyle = '#88f';
  ctx.beginPath();
  ctx.arc(-7, 4, 1.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(7, 4, 1.5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ---- SPRITE: Frank the Pug ----
function drawFrank(x, y, frame, happy) {
  ctx.save();
  ctx.translate(x, y);

  const wag = Math.sin(frame * 0.3) * 0.3;
  const bob = happy ? Math.sin(frame * 0.15) * 3 : 0;

  // Tail
  ctx.save();
  ctx.translate(-22, -8 + bob);
  ctx.rotate(wag);
  ctx.strokeStyle = C.pugBody;
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(0, 0, 8, -Math.PI * 0.8, -Math.PI * 0.1);
  ctx.stroke();
  ctx.restore();

  // Body
  ctx.fillStyle = C.pugBody;
  ctx.beginPath();
  ctx.ellipse(0, 0 + bob, 22, 15, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  ctx.fillStyle = C.pugLeg;
  const legAnim = Math.sin(frame * 0.2) * 3;
  ctx.fillRect(-16, 10 + bob, 10, 14 + legAnim);
  ctx.fillRect(-4, 10 + bob, 10, 14 - legAnim);
  ctx.fillRect(8, 10 + bob, 10, 14 + legAnim);
  ctx.fillRect(16, 10 + bob, 10, 14 - legAnim);

  // Head
  ctx.fillStyle = C.pugBody;
  ctx.beginPath();
  ctx.arc(20, -14 + bob, 16, 0, Math.PI * 2);
  ctx.fill();

  // Ears
  ctx.fillStyle = C.pugEar;
  ctx.beginPath();
  ctx.ellipse(10, -26 + bob, 6, 7, -0.3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(30, -26 + bob, 6, 7, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Face (dark muzzle)
  ctx.fillStyle = C.pugFace;
  ctx.beginPath();
  ctx.ellipse(22, -8 + bob, 11, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = C.pugFace;
  ctx.beginPath();
  ctx.ellipse(14, -18 + bob, 4, 4.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(26, -18 + bob, 4, 4.5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(15.5, -19 + bob, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(27.5, -19 + bob, 2, 0, Math.PI * 2);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.ellipse(22, -10 + bob, 4, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Tongue
  if (happy || frame % 120 < 60) {
    ctx.fillStyle = C.pugTongue;
    ctx.beginPath();
    ctx.ellipse(22, -3 + bob, 3, 4, 0, 0, Math.PI);
    ctx.fill();
  }

  ctx.restore();
}

// ---- SPRITE: Flag ----
function drawFlag(x, y) {
  ctx.fillStyle = C.flagPole;
  ctx.fillRect(x - 2, y - 80, 4, 80);
  // Ball top
  ctx.beginPath();
  ctx.arc(x, y - 80, 5, 0, Math.PI * 2);
  ctx.fill();
  // Flag triangle
  ctx.fillStyle = C.flagColor;
  ctx.beginPath();
  ctx.moveTo(x + 2, y - 78);
  ctx.lineTo(x + 35, y - 65);
  ctx.lineTo(x + 2, y - 52);
  ctx.closePath();
  ctx.fill();
}

// ---- SPRITE: Cage ----
function drawCage(x, y, open) {
  const w = 70, h = 80;
  ctx.strokeStyle = C.cage;
  ctx.lineWidth = 3;

  if (open) {
    ctx.globalAlpha = 0.3;
  }

  // Top bar
  ctx.fillStyle = C.cageTop;
  ctx.fillRect(x - 4, y, w + 8, 6);

  // Vertical bars
  for (let i = 0; i <= 5; i++) {
    ctx.fillStyle = C.cage;
    ctx.fillRect(x + i * 14, y, 3, h);
  }

  if (open) {
    ctx.globalAlpha = 0.4;
    // Open door
    ctx.save();
    ctx.translate(x + w, y);
    ctx.transform(0.6, 0, -0.3, 1, 0, 0); // perspective skew
    ctx.strokeStyle = C.cage;
    ctx.lineWidth = 3;
    ctx.strokeRect(0, 0, 30, h);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  ctx.globalAlpha = 1;
}

// ---- Environment drawing ----
function drawCloud(x, y, w) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.beginPath();
  ctx.ellipse(x + 3, y + 5, w * 0.5, w * 0.16, 0, 0, Math.PI * 2);
  ctx.fill();
  // Main body
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.beginPath();
  ctx.ellipse(x, y, w * 0.5, w * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();
  // Puffs
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.beginPath();
  ctx.ellipse(x - w * 0.2, y - w * 0.1, w * 0.28, w * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + w * 0.15, y - w * 0.12, w * 0.25, w * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x - w * 0.05, y - w * 0.16, w * 0.2, w * 0.16, 0, 0, Math.PI * 2);
  ctx.fill();
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.ellipse(x - w * 0.1, y - w * 0.15, w * 0.15, w * 0.1, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawBush(x, y, w) {
  ctx.fillStyle = '#2d8855';

  ctx.ellipse(x, y, w * 0.5, w * 0.3, 0, 0, Math.PI * 2);

  ctx.ellipse(x - w * 0.15, y - w * 0.05, w * 0.3, w * 0.22, 0, 0, Math.PI * 2);

function drawTree(x, y) {

function drawCastleBg(x, y) {

// ---- Level init ----
function initLevel(n) {
  const levels = getLevels();
  levelData = levels[n];
  player = {
    x: 80, y: levelData.groundY - 60,
    vx: 0, vy: 0,
    w: 30, h: STAND_H,
    onGround: false,
    crouching: false,
    facing: 1,
    frame: 0,
    dead: false,
    deathTimer: 0,
    invincible: 0,
    coyoteTime: 0,
    jumpBuffer: 0
  };
  // If no ground (sky castle), start on first platform
  if (!levelData.hasGround) {
    const firstPlat = levelData.platforms[0];
    player.x = firstPlat.x + firstPlat.w / 2;
    player.y = firstPlat.y - 60;
  }
  enemies = levelData.enemyDefs.map(e => {
    const isSlime = e.type === 'slime';
    const eh = isSlime ? 24 : 38;
    const ew = isSlime ? 44 : 40;
    let ey;
    if (e.onPlatform) {
      // Adjust y for enemy height (defs assume goblin height of 38)
      ey = e.y + (38 - eh);
    } else {
      ey = levelData.groundY - eh;
    }
    return {
      x: e.x, y: ey, startX: e.x, patrol: e.patrol,
      w: ew, h: eh, type: e.type || 'goblin',
      vx: isSlime ? 1.5 : 1, alive: true, squishTimer: 0, frame: 0
    };
  });
  for (const en of enemies) {
    if (en.y <= 0) en.y = levelData.groundY - en.h;
  }
  tiaras = levelData.tiaraDefs.map(t => ({
    x: t.x, y: t.y, collected: false, frame: Math.random() * 100
  }));
  particles = [];
  flagObj = levelData.flagX ? { x: levelData.flagX, y: levelData.flagY || levelData.groundY } : null;
  cageObj = levelData.cageX ? { x: levelData.cageX, y: levelData.cageY, open: false } : null;
  camera.x = 0;
  levelCompleteTimer = 0;
}

// ---- Add score ----
function addScore(pts, x, y) {
  score += pts;
  spawnScoreText(x, y - 20, '+' + pts);
}

// ---- Collision helpers ----
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function isOverGap(x, w) {
  if (!levelData.gaps) return false;
  for (const g of levelData.gaps) {
    if (x + w > g.x && x < g.x + g.w) return true;
  }
  return false;
}

// ---- Update ----
let frame = 0;

function update() {
  frame++;
  updateInput();

  if (state === 'title') {
    titlePulse += 0.03;
    // Tap/key to start
    if (input.jumpEdge || (input.left || input.right)) {
      state = 'playing';
      level = 0; score = 0; lives = 5; tiaraCount = 0; nextLifeTiaras = 10;
      initLevel(0);
    }
    return;
  }

  if (state === 'levelComplete') {
    levelCompleteTimer++;
    updateParticles();
    if (levelCompleteTimer > 120) {
      if (level < 4) {
        level++;
        initLevel(level);
        state = 'playing';
      } else {
        state = 'victory';
        victoryTimer = 0;
      }
    }
    return;
  }

  if (state === 'gameOver') {
    gameOverTimer++;
    if (gameOverTimer > 120 && input.jumpEdge) {
      state = 'title';
    }
    return;
  }

  if (state === 'victory') {
    victoryTimer++;
    updateParticles();
    if (victoryTimer % 15 === 0) {
      spawnVictoryHearts(player.x, player.y - 40);
    }
    if (victoryTimer > 180 && input.jumpEdge) {
      state = 'title';
    }
    return;
  }

  // ---- Playing state ----
  if (player.dead) {
    player.deathTimer++;
    player.vy += GRAVITY_FALL * 0.5;
    player.y += player.vy;
    updateParticles();
    if (player.deathTimer > 90) {
      lives--;
      if (lives <= 0) {
        state = 'gameOver';
        gameOverTimer = 0;
      } else {
        initLevel(level);
      }
    }
    return;
  }

  player.frame++;
  if (player.invincible > 0) player.invincible--;

  // Crouch
  const wasCrouching = player.crouching;
  player.crouching = input.down && player.onGround;
  if (player.crouching && !wasCrouching) {
    player.y += (STAND_H - CROUCH_H);
    player.h = CROUCH_H;
  } else if (!player.crouching && wasCrouching) {
    player.y -= (STAND_H - CROUCH_H);
    player.h = STAND_H;
  }

  // Acceleration-based movement (ground has more control than air)
  const accel = player.onGround ? GROUND_ACCEL : AIR_ACCEL;
  const decel = player.onGround ? GROUND_DECEL : AIR_DECEL;
  const maxSpd = player.crouching ? MAX_SPEED * 0.4 : MAX_SPEED;
  if (input.left) { player.vx -= accel; player.facing = -1; }
  else if (input.right) { player.vx += accel; player.facing = 1; }
  else {
    if (Math.abs(player.vx) < decel) player.vx = 0;
    else player.vx -= Math.sign(player.vx) * decel;
  }
  if (player.vx > maxSpd) player.vx = maxSpd;
  if (player.vx < -maxSpd) player.vx = -maxSpd;

  // Jump buffer — queue a jump if pressed slightly before landing
  if (input.jumpEdge) player.jumpBuffer = BUFFER_FRAMES;
  if (player.jumpBuffer > 0) player.jumpBuffer--;

  // Jump with coyote time + jump buffer (can't jump while crouching)
  const canJump = (player.onGround || player.coyoteTime > 0) && !player.crouching;
  if (player.jumpBuffer > 0 && canJump) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    player.coyoteTime = 0;
    player.jumpBuffer = 0;
  }

  // Variable gravity — hold jump for full height, tap for short hop
  if (player.vy < 0 && input.jumpPressed) {
    player.vy += GRAVITY_RISE;   // float while holding jump
  } else if (player.vy < 0) {
    player.vy += GRAVITY_CUT;    // cut jump short on release
  } else {
    player.vy += GRAVITY_FALL;   // snap down when falling
  }
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;

  // Move X
  player.x += player.vx;
  if (player.x < 10) player.x = 10;
  if (player.x > levelData.width - 10) player.x = levelData.width - 10;

  // Move Y
  player.y += player.vy;
  player.onGround = false;

  // Ground collision
  if (levelData.hasGround && player.y + player.h >= levelData.groundY) {
    if (!isOverGap(player.x - player.w / 2, player.w)) {
      player.y = levelData.groundY - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  }

  // Platform collision (one-way: can jump through from below)
  for (const p of levelData.platforms) {
    const px = player.x - player.w / 2;
    const py = player.y + player.h;
    const prevPy = py - player.vy;
    if (player.vy >= 0 && prevPy <= p.y + 2 &&
        px + player.w > p.x && px < p.x + p.w &&
        py >= p.y && py <= p.y + 20) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  }

  // Coyote time — brief window to jump after walking off a ledge
  if (player.onGround) {
    player.coyoteTime = COYOTE_FRAMES;
  } else if (player.coyoteTime > 0) {
    player.coyoteTime--;
  }

  // Fall death
  if (player.y > H + 50) {
    killPlayer();
  }

  // Enemy update & collision
  for (const en of enemies) {
    if (!en.alive) {
      if (en.squishTimer > 0) en.squishTimer--;
      continue;
    }
    en.frame++;
    en.x += en.vx;
    if (en.x > en.startX + en.patrol || en.x < en.startX - en.patrol) {
      en.vx *= -1;
    }

    // Player collision
    if (player.invincible > 0) continue;
    const px = player.x - player.w / 2;
    const ey = en.y;
    if (rectsOverlap(px, player.y, player.w, player.h, en.x - en.w / 2, ey, en.w, en.h)) {
      // Stomp? Player bottom hitting enemy top half, player moving down
      const playerBottom = player.y + player.h;
      const enemyMid = ey + en.h * 0.5;
      if (player.vy > 0 && playerBottom < enemyMid + 5) {
        // Stomp!
        en.alive = false;
        en.squishTimer = 40;
        player.vy = STOMP_BOUNCE;
        addScore(100, en.x, en.y);
        spawnStompParticles(en.x, en.y);
      } else {
        // Player hit
        killPlayer();
      }
    }
  }

  // Tiara collection
  for (const t of tiaras) {
    if (t.collected) continue;
    t.frame++;
    const px = player.x - player.w / 2;
    if (rectsOverlap(px, player.y, player.w, player.h, t.x - 12, t.y - 10, 24, 20)) {
      t.collected = true;
      addScore(50, t.x, t.y);
      spawnCollectParticles(t.x, t.y);
      tiaraCount++;
      if (tiaraCount >= nextLifeTiaras) {
        lives++;
        nextLifeTiaras += 10;
        spawnScoreText(t.x, t.y - 50, '1UP!');
      }
    }
  }

  // Flag check
  if (flagObj && Math.abs(player.x - flagObj.x) < 30 && player.y + player.h > flagObj.y - 80) {
    state = 'levelComplete';
    levelCompleteTimer = 0;
  }

  // Cage check (level 5)
  if (cageObj && !cageObj.open && Math.abs(player.x - cageObj.x - 35) < 50 && player.y + player.h > cageObj.y) {
    cageObj.open = true;
    state = 'victory';
    victoryTimer = 0;
    addScore(500, cageObj.x + 35, cageObj.y);
  }

  // Camera
  const targetCamX = player.x - W * 0.35;
  camera.x += (targetCamX - camera.x) * 0.1;
  if (camera.x < 0) camera.x = 0;
  if (camera.x > levelData.width - W) camera.x = levelData.width - W;

  updateParticles();
}

function killPlayer() {
  if (player.dead || player.invincible > 0) return;
  player.dead = true;
  player.deathTimer = 0;
  player.vy = -8;
  spawnDeathParticles(player.x, player.y + 30);
}

// ---- Render ----
function render() {
  ctx.clearRect(0, 0, W, H);

  if (state === 'title') {
    renderTitle();
    return;
  }

  if (state === 'gameOver') {
    renderGameOver();
    return;
  }

  // All playing/levelComplete/victory states render the level
  renderLevel();

  if (state === 'levelComplete') {
    renderLevelComplete();
  } else if (state === 'victory') {
    renderVictory();
  }

  renderHUD();
  if (state === 'playing' && !player.dead) {
    renderControls();
  }
}

function renderLevel() {
  const ld = levelData;

  // Sky gradient with atmospheric depth
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, ld.sky[0]);
  grad.addColorStop(0.3, ld.sky[1]);
  grad.addColorStop(0.6, ld.sky[2]);
  grad.addColorStop(1, ld.sky[3] || ld.sky[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Sun (for outdoor daytime levels)
  if (ld.sun) {
    const sx = ld.sun[0], sy = ld.sun[1], sr = ld.sun[2];
    const sunGlow = ctx.createRadialGradient(sx, sy, sr * 0.5, sx, sy, sr * 4);
    sunGlow.addColorStop(0, 'rgba(255,250,220,0.4)');
    sunGlow.addColorStop(0.5, 'rgba(255,240,200,0.1)');
    sunGlow.addColorStop(1, 'rgba(255,230,180,0)');
    ctx.fillStyle = sunGlow;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(255,250,230,0.9)';
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  }

  // Stars for dark levels
  if (ld.stars) {
    const starSeed = [30,90,120,200,280,60,170,320,350,40,150,250,310,100,210,340,80,260,180,50];
    for (let i = 0; i < 20; i++) {
      const sx = (starSeed[i] * 3 + i * 200) % W;
      const sy = 50 + (starSeed[(i + 5) % 20] * 2) % 200;
      const brightness = 0.5 + 0.5 * Math.sin(frame * 0.05 + i);
      ctx.globalAlpha = brightness;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(sx, sy, 1.5 + (i % 3), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // Parallax clouds (0.3x)
  for (const c of ld.clouds) {
    drawCloud(c.x - camera.x * 0.3, c.y, c.w);
  }

  // Mid-ground decorations (0.6x)
  for (const d of ld.decorations) {
    const dx = d.x - camera.x * 0.6;
    if (d.type === 'bush') drawBush(dx, ld.groundY - 5, d.w);
    if (d.type === 'tree') drawTree(dx, ld.groundY);
    if (d.type === 'castle') drawCastleBg(dx, ld.groundY);
  }

  // Cave ceiling for cave level
  if (level === 2) {
    ctx.fillStyle = '#2a2a3e';
    ctx.fillRect(0, 0, W, 80);
    // Stalactites
    for (let i = 0; i < 15; i++) {
      const sx = i * 30 + 10 - (camera.x * 0.8) % 30;
      ctx.fillStyle = '#3a3a55';
      ctx.beginPath();
      ctx.moveTo(sx, 0);
      ctx.lineTo(sx + 8, 0);
      ctx.lineTo(sx + 4, 30 + (i % 3) * 15);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Ground — gold brick pattern
  if (ld.hasGround) {
    const gy = ld.groundY;
    if (ld.gaps) {
      let segments = [];
      let lastEnd = -camera.x;
      const sorted = [...ld.gaps].sort((a, b) => a.x - b.x);
      for (const g of sorted) {
        segments.push({ x: lastEnd, w: g.x - camera.x - lastEnd });
        lastEnd = g.x + g.w - camera.x;
      }
      segments.push({ x: lastEnd, w: W - lastEnd + camera.x + 200 });
      for (const seg of segments) {
        if (seg.w <= 0) continue;
        // Golden top edge
        ctx.fillStyle = '#E8C252';
        ctx.fillRect(seg.x, gy, seg.w, 4);
        // Brick fill (clipped to segment, scrolls with camera)
        ctx.save();
        ctx.beginPath();
        ctx.rect(seg.x, gy + 4, seg.w, H - gy - 4);
        ctx.clip();
        ctx.fillStyle = brickPattern;
        ctx.translate(-(camera.x % 64), 0);
        ctx.fillRect(0, gy + 4, W + 128, H - gy - 4);
        ctx.restore();
      }
    } else {
      ctx.fillStyle = '#E8C252';
      ctx.fillRect(0, gy, W, 4);
      ctx.save();
      ctx.fillStyle = brickPattern;
      ctx.translate(-(camera.x % 64), 0);
      ctx.fillRect(0, gy + 4, W + 64, H - gy - 4);
      ctx.restore();
    }
  } else {
    ctx.fillStyle = ld.sky[2];
    ctx.fillRect(0, H * 0.6, W, H * 0.4);
  }

  // Platforms
  for (const p of ld.platforms) {
    const px = p.x - camera.x;
    if (px > W + 20 || px + p.w < -20) continue;
    ctx.fillStyle = C.platform;
    ctx.fillRect(px, p.y, p.w, 16);
    ctx.fillStyle = C.platformTop;
    ctx.fillRect(px, p.y, p.w, 4);
  }

  // Tiaras
  for (const t of tiaras) {
    if (t.collected) continue;
    const tx = t.x - camera.x;
    if (tx > W + 20 || tx < -20) continue;
    drawTiara(tx, t.y, t.frame);
  }

  // Flag
  if (flagObj) {
    drawFlag(flagObj.x - camera.x, flagObj.y);
  }

  // Cage
  if (cageObj) {
    drawCage(cageObj.x - camera.x, cageObj.y, cageObj.open);
    // Frank inside/outside cage
    if (cageObj.open) {
      drawFrank(cageObj.x + 35 + 50 - camera.x, cageObj.y + 55, frame, true);
    } else {
      drawFrank(cageObj.x + 35 - camera.x, cageObj.y + 55, frame, false);
    }
  }

  // Enemies
  for (const en of enemies) {
    const ex = en.x - camera.x;
    if (ex > W + 40 || ex < -40) continue;
    if (en.alive) {
      if (en.type === 'slime') drawSlime(ex, en.y, en.frame, false);
      else drawGoblin(ex, en.y, en.frame, false);
    } else if (en.squishTimer > 0) {
      if (en.type === 'slime') drawSlime(ex, en.y + 12, en.frame, true);
      else drawGoblin(ex, en.y + 20, en.frame, true);
    }
  }

  // Princess
  if (!player.dead || player.deathTimer < 90) {
    const px = player.x - camera.x;
    // Blink when invincible
    if (player.invincible > 0 && frame % 6 < 3) {
      // skip draw
    } else {
      drawPrincess(px, player.y + player.h, player.facing, player.frame, !player.onGround, player.crouching);
    }
  }

  // Particles
  drawParticles();
}

function renderHUD() {
  // Hearts
  const hudY = 54;
  for (let i = 0; i < Math.min(lives, 10); i++) {
    drawHeart(24 + i * 22, hudY, 8, C.heart);
  }

  // Score
  ctx.font = 'bold 20px Georgia';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'right';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 4;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;
  ctx.fillText(score, W - 20, hudY + 6);
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
  ctx.textAlign = 'left';

  // Level name
  ctx.font = '14px Georgia';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.textAlign = 'center';
  ctx.fillText(levelData.name, W / 2, hudY + 4);
  ctx.textAlign = 'left';
}

function renderControls() {
  ctx.globalAlpha = 0.3;

  // D-pad
  const dpadX = 80, dpadY = H - 80;
  ctx.fillStyle = '#fff';
  // Horizontal
  ctx.beginPath();
  ctx.roundRect(dpadX - 50, dpadY - 17, 100, 34, 8);
  ctx.fill();
  // Vertical
  ctx.beginPath();
  ctx.roundRect(dpadX - 17, dpadY - 50, 34, 100, 8);
  ctx.fill();

  // Arrows
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  // Left arrow
  ctx.beginPath();
  ctx.moveTo(dpadX - 35, dpadY);
  ctx.lineTo(dpadX - 25, dpadY - 7);
  ctx.lineTo(dpadX - 25, dpadY + 7);
  ctx.fill();
  // Right arrow
  ctx.beginPath();
  ctx.moveTo(dpadX + 35, dpadY);
  ctx.lineTo(dpadX + 25, dpadY - 7);
  ctx.lineTo(dpadX + 25, dpadY + 7);
  ctx.fill();

  // Jump button
  const btnX = W - 60, btnY = H - 90;
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.arc(btnX, btnY, 30, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px Georgia';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('A', btnX, btnY);
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'left';

  ctx.globalAlpha = 1;
}

function renderTitle() {
  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a5276');
  grad.addColorStop(0.3, '#2e86c1');
  grad.addColorStop(0.6, '#85c1e9');
  grad.addColorStop(1, '#d6eaf8');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Sun
  const tsg = ctx.createRadialGradient(310, 100, 10, 310, 100, 100);
  tsg.addColorStop(0, 'rgba(255,250,220,0.4)');
  tsg.addColorStop(0.5, 'rgba(255,240,200,0.1)');
  tsg.addColorStop(1, 'rgba(255,230,180,0)');
  ctx.fillStyle = tsg;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,250,230,0.9)';
  ctx.beginPath();
  ctx.arc(310, 100, 25, 0, Math.PI * 2);
  ctx.fill();

  // Clouds
  drawCloud(60, 120, 80);
  drawCloud(250, 90, 60);
  drawCloud(340, 160, 70);

  // Ground
  ctx.fillStyle = '#E8C252';
  ctx.fillRect(0, H - 150, W, 4);
  ctx.fillStyle = brickPattern;
  ctx.fillRect(0, H - 146, W, 146);

  // Princess
  drawPrincess(W * 0.35, H - 150, 1, frame, false);

  // Caged Frank
  drawCage(W * 0.55, H - 230, false);
  drawFrank(W * 0.55 + 35, H - 175, frame, false);

  // A couple goblins
  drawGoblin(W * 0.15, H - 188, frame, false);
  drawGoblin(W * 0.85, H - 188, frame, false);

  // Title
  const pulse = 1 + Math.sin(titlePulse) * 0.05;
  ctx.save();
  ctx.translate(W / 2, 200);
  ctx.scale(pulse, pulse);
  ctx.font = 'bold 42px Georgia';
  ctx.fillStyle = C.crown;
  ctx.textAlign = 'center';
  ctx.shadowColor = '#c0392b';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 3;
  ctx.shadowOffsetY = 3;
  ctx.fillText('Princess', 0, 0);
  ctx.fillText('& Frank', 0, 48);
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
  ctx.restore();

  // Subtitle
  ctx.font = '18px Georgia';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText('Save Frank the Pug!', W / 2, 280);

  // Tap to start
  const blink = Math.sin(frame * 0.08) > 0;
  if (blink) {
    ctx.font = 'bold 22px Georgia';
    ctx.fillStyle = '#fff';
    ctx.fillText('Tap to Start', W / 2, H / 2 + 60);
  }

  ctx.textAlign = 'left';
}

function renderLevelComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, W, H);

  const scale = Math.min(levelCompleteTimer / 20, 1);
  ctx.save();
  ctx.translate(W / 2, H * 0.35);
  ctx.scale(scale, scale);
  ctx.font = 'bold 36px Georgia';
  ctx.fillStyle = C.crown;
  ctx.textAlign = 'center';
  ctx.shadowColor = '#c0392b';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 3;
  ctx.shadowOffsetY = 3;
  ctx.fillText('Level Clear!', 0, 0);
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;
  ctx.font = '20px Georgia';
  ctx.fillStyle = '#fff';
  ctx.fillText(levelData.name, 0, 40);
  ctx.restore();
  ctx.textAlign = 'left';
}

function renderGameOver() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a0533');
  grad.addColorStop(1, '#2d1b69');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.font = 'bold 42px Georgia';
  ctx.fillStyle = '#e74c3c';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 3;
  ctx.shadowOffsetY = 3;
  ctx.fillText('Game Over', W / 2, H * 0.35);
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  ctx.font = '22px Georgia';
  ctx.fillStyle = C.crown;
  ctx.fillText('Score: ' + score, W / 2, H * 0.45);

  if (gameOverTimer > 60) {
    const blink = Math.sin(frame * 0.08) > 0;
    if (blink) {
      ctx.font = '20px Georgia';
      ctx.fillStyle = '#fff';
      ctx.fillText('Tap to Retry', W / 2, H * 0.55);
    }
  }

  ctx.textAlign = 'left';
}

function renderVictory() {
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, 0, W, H);

  const scale = Math.min(victoryTimer / 20, 1);
  ctx.save();
  ctx.translate(W / 2, 180);
  ctx.scale(scale, scale);

  ctx.font = 'bold 40px Georgia';
  ctx.fillStyle = C.crown;
  ctx.textAlign = 'center';
  ctx.shadowColor = '#c0392b';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetX = 3;
  ctx.shadowOffsetY = 3;
  ctx.fillText('YOU DID IT!', 0, 0);
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = 0;

  ctx.font = '20px Georgia';
  ctx.fillStyle = '#fff';
  ctx.fillText('Frank is saved!', 0, 40);

  ctx.font = '22px Georgia';
  ctx.fillStyle = C.crown;
  ctx.fillText('Final Score: ' + score, 0, 90);

  ctx.restore();

  if (victoryTimer > 120) {
    const blink = Math.sin(frame * 0.08) > 0;
    if (blink) {
      ctx.font = '20px Georgia';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText('Tap to Play Again', W / 2, H * 0.55);
    }
  }

  ctx.textAlign = 'left';
}

// ---- Game loop ----
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// Polyfill roundRect if needed
if (!ctx.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
    const r = typeof radii === 'number' ? [radii,radii,radii,radii] :
              Array.isArray(radii) ? radii.concat([0,0,0,0]).slice(0,4) : [0,0,0,0];
    this.moveTo(x + r[0], y);
    this.lineTo(x + w - r[1], y);
    this.arcTo(x + w, y, x + w, y + r[1], r[1]);
    this.lineTo(x + w, y + h - r[2]);
    this.arcTo(x + w, y + h, x + w - r[2], y + h, r[2]);
    this.lineTo(x + r[3], y + h);
    this.arcTo(x, y + h, x, y + h - r[3], r[3]);
    this.lineTo(x, y + r[0]);
    this.arcTo(x, y, x + r[0], y, r[0]);
    this.closePath();
  };
}

// ---- Start ----
gameLoop();
</script>
